name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Smoke tests for the dagger-ci module itself. We deliberately avoid running
# every function against real fixtures here — that would require committing
# a test Terraform module, which is more maintenance surface than value at
# this scale. Instead:
#   1. `dagger develop` validates the module compiles + generates SDK bindings.
#   2. `dagger functions` validates the GraphQL schema extraction works and
#      every exported method has a valid signature.
# If either of those fail, the module would not load for any consumer, so
# these two jobs catch ~every realistic breakage.

jobs:
  module-loads:
    name: dagger module loads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install Dagger CLI
        run: |
          set -eux
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | DAGGER_VERSION=0.20.6 BIN_DIR=/usr/local/bin sudo -E sh
          dagger version

      - name: dagger develop (regenerates SDK bindings)
        run: dagger develop

      - name: dagger functions (validates module schema)
        run: dagger functions

      - name: go vet (validates module compiles)
        run: |
          go mod tidy
          go vet ./...
